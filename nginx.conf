# PLUSQULEBI.GE — nginx site config (translated from the original Apache .htaccess)
# Loaded into the http{} context via /etc/nginx/conf.d/.

# Per-response Cache-Control derived from the response content type. A map keeps
# every header at the server level, which matters because nginx drops inherited
# add_header directives the moment a location/if block declares its own. Mirrors
# the .htaccess: static assets 1y immutable, HTML 1d, JSON/XML 1h, else 1h.
map $sent_http_content_type $cache_control_by_type {
    default             "public, max-age=3600, must-revalidate";
    ~*text/html         "public, max-age=86400, must-revalidate";
    ~*text/css          "public, max-age=31536000, immutable";
    ~*javascript        "public, max-age=31536000, immutable";
    ~*image/            "public, max-age=31536000, immutable";
    ~*font/             "public, max-age=31536000, immutable";
    ~*application/font  "public, max-age=31536000, immutable";
    ~*application/json  "public, max-age=3600, must-revalidate";
    ~*xml               "public, max-age=3600, must-revalidate";
}

# Path-level override layered on top of the content-type table. lastTrans.json
# holds live trade data, so it must never be cached; everything else falls back
# to the content-type rule above. Done as a map (not a location add_header) so
# the server-level security headers stay inherited — see the note above.
map $uri $cache_control {
    default          $cache_control_by_type;
    /lastTrans.json  "no-store";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Force HTTPS behind a reverse proxy (Coolify/Traefik) -------------------
    # TLS is terminated at the proxy, so the container only ever sees plain HTTP.
    # Key the redirect off X-Forwarded-Proto to avoid a redirect loop and let the
    # health check (which sends no such header) succeed. Enable "Force HTTPS" /
    # Let's Encrypt in Coolify so the proxy sets this header.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # --- Compression (mod_deflate equivalent) -----------------------------------
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xml
        font/opentype
        font/otf
        font/ttf
        image/svg+xml
        image/x-icon
        text/css
        text/javascript
        text/plain
        text/xml;

    # --- Headers: caching + security (mod_headers / mod_expires equivalent) -----
    # Declared at server level only, so they apply uniformly to every response.
    add_header Cache-Control $cache_control always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;" always;

    # --- Block hidden/sensitive files (.htaccess, .git, etc.) -------------------
    # .well-known is allowed in case the proxy ever proxies ACME challenges.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --- Static serving ---------------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }
}
