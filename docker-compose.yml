# Coolify deployment for PLUSQULEBI.GE
#
# In Coolify: create a new resource -> "Docker Compose" -> point it at this repo.
# Set the domain/FQDN in the Coolify UI and enable HTTPS (Let's Encrypt);
# Coolify's proxy (Traefik) terminates TLS and routes to the exposed port below.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Coolify's reverse proxy routes the configured domain to this port.
    expose:
      - "80"
    environment:
      # Coolify "magic" variable: route the domain to port 80 of this service.
      # EXPOSE alone is unreliable for compose port detection, which causes the
      # Traefik "no available server" (503) error. Leave the value empty to let
      # Coolify generate a domain, or set your own, e.g.:
      #   - SERVICE_FQDN_WEB_80=plusqulebi.ge
      - SERVICE_FQDN_WEB_80
    volumes:
      # Serve lastTrans.json straight from the host file. This file is updated
      # out-of-band on the host and is NOT part of the repo/image.
      # The host file MUST exist before the first deploy (see DEPLOY.md),
      # otherwise Docker creates a directory in its place.
      - /home/Valus/lastTrans.json:/usr/local/apache2/htdocs/lastTrans.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
